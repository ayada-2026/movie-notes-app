<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Note</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.min.js"></script>
  </head>
  <body>
    <div class="film-rail" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Personal archive</p>
          <h1>Cinema Note</h1>
          <p class="brand-note">기억하고 싶은 영화, 한 줄의 기록</p>
        </div>
      </header>

      <main>
        <section class="auth-panel" id="authView">
          <div class="auth-copy">
            <p class="eyebrow">Private notes</p>
            <h2>로그인</h2>
          </div>
          <form class="auth-form" id="authForm">
            <label>
              <span>이메일</span>
              <input id="emailInput" type="email" autocomplete="email" required />
            </label>
            <label>
              <span>비밀번호</span>
              <input
                id="passwordInput"
                type="password"
                autocomplete="current-password"
                required
                minlength="6"
              />
            </label>
            <p class="form-error" id="authError" aria-live="assertive"></p>
            <button class="primary-button" id="signInButton" type="submit">로그인</button>
          </form>
        </section>

        <section class="app-content is-hidden" id="appContent">
          <section class="toolbar" aria-label="검색 및 정렬">
            <label class="search-field">
              <span>제목 검색</span>
              <input
                id="searchInput"
                type="search"
                placeholder="영화 제목을 입력하세요"
                autocomplete="off"
              />
            </label>

            <label class="select-field">
              <span>정렬</span>
              <select id="sortSelect">
                <option value="watchedDate-desc">본 날짜 최신순</option>
                <option value="watchedDate-asc">본 날짜 오래된순</option>
                <option value="releaseYear-desc">출시년도 높은순</option>
                <option value="releaseYear-asc">출시년도 낮은순</option>
              </select>
            </label>
          </section>

          <section class="summary-row" aria-live="polite">
            <p id="resultSummary">0개의 기록</p>
            <div class="summary-actions">
              <p class="status-text" id="appStatus"></p>
              <button class="ghost-button" id="clearSearchButton" type="button">
                검색 초기화
              </button>
              <div class="top-actions" aria-label="계정 및 기록 작업">
                <button class="primary-button is-hidden" id="addMovieButton" type="button">
                  <span aria-hidden="true">+</span>
                  새 기록
                </button>
                <div class="account-chip is-hidden" id="accountChip">
                  <button class="ghost-button" id="signOutButton" type="button">로그아웃</button>
                </div>
              </div>
            </div>
          </section>

          <section class="movie-grid" id="movieGrid" aria-label="영화 감상 목록"></section>

          <nav class="pagination is-hidden" id="pagination" aria-label="영화 목록 페이지">
            <button class="secondary-button" id="prevPageButton" type="button">이전</button>
            <div class="page-buttons" id="pageButtons"></div>
            <button class="secondary-button" id="nextPageButton" type="button">다음</button>
          </nav>

          <section class="empty-state is-hidden" id="emptyState">
            <div class="empty-poster" aria-hidden="true">
              <span></span>
            </div>
            <h2>아직 기록이 없습니다</h2>
            <p>처음 남기고 싶은 영화 한 편을 추가해보세요.</p>
            <button class="primary-button" id="emptyAddButton" type="button">
              <span aria-hidden="true">+</span>
              첫 기록 추가
            </button>
          </section>
        </section>
      </main>
    </div>

    <div class="modal-backdrop is-hidden" id="movieModal" role="presentation">
      <section
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <div class="modal-header">
          <div>
            <p class="eyebrow">Movie entry</p>
            <h2 id="modalTitle">새 영화 기록</h2>
          </div>
          <button class="icon-button" id="closeModalButton" type="button" aria-label="닫기">
            x
          </button>
        </div>

        <form id="movieForm">
          <input id="movieId" type="hidden" />

          <label>
            <span>제목</span>
            <input id="titleInput" type="text" required maxlength="80" />
          </label>

          <div class="form-grid">
            <label>
              <span>출시년도</span>
              <input
                id="releaseYearInput"
                type="number"
                required
                min="1888"
                max="2100"
                inputmode="numeric"
              />
            </label>

            <label>
              <span>본 날짜</span>
              <input id="watchedDateInput" type="date" required />
            </label>
          </div>

          <div class="poster-field">
            <input id="posterCurrentValue" type="hidden" />

            <label>
              <span>포스터 이미지 <small>선택</small></span>
              <input
                id="posterFileInput"
                type="file"
                accept="image/png,image/jpeg,image/webp,image/gif"
              />
            </label>

            <label>
              <span>포스터 이미지 URL <small>선택</small></span>
              <input
                id="posterInput"
                type="url"
                placeholder="https://example.com/poster.jpg"
              />
            </label>

            <label class="checkbox-field is-hidden" id="removePosterField">
              <input id="removePosterInput" type="checkbox" />
              <span>현재 포스터 제거</span>
            </label>

            <p class="help-text" id="posterHelp">
              파일을 첨부하거나 URL을 입력할 수 있습니다. 파일은 비공개 저장소에 보관됩니다.
            </p>
          </div>

          <label>
            <span>감상</span>
            <textarea
              id="reviewInput"
              rows="8"
              placeholder="영화를 보고 남기고 싶은 생각을 적어주세요."
            ></textarea>
          </label>

          <p class="form-error" id="formError" aria-live="assertive"></p>

          <div class="modal-actions">
            <button class="secondary-button" id="cancelButton" type="button">취소</button>
            <button class="primary-button" type="submit">저장</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop is-hidden" id="detailModal" role="presentation">
      <section
        class="modal detail-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="detailTitle"
      >
        <div class="modal-header detail-header">
          <div class="detail-heading">
            <p class="eyebrow">Movie note</p>
            <div class="detail-title-row">
              <h2 id="detailTitle"></h2>
              <span class="detail-year-pill" id="detailReleaseYear"></span>
            </div>
            <div class="detail-date-row">
              <span id="detailWatchedDate"></span>
            </div>
          </div>
          <img
            class="detail-summer-character"
            src="assets/images/summer-character.png"
            alt=""
            aria-hidden="true"
          />
          <button class="icon-button" id="closeDetailButton" type="button" aria-label="닫기">
            x
          </button>
        </div>

        <div class="detail-body">
          <div class="detail-poster" id="detailPoster"></div>
          <div class="detail-content">
            <p class="detail-review" id="detailReview"></p>
          </div>
        </div>

        <div class="modal-actions detail-actions">
          <button class="secondary-button" id="detailEditButton" type="button">수정</button>
          <button class="secondary-button danger-button" id="detailDeleteButton" type="button">
            삭제
          </button>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
